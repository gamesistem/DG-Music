<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dg / Music - Player</title>
    <!-- Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para os ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden; /* Evita rolagem na página inteira */
        }

        /* Cores base estilo Spotify */
        :root {
            --spotify-green: #1db954;
            --spotify-green-hover: #1ed760;
            --bg-base: #121212;
            --bg-highlight: #1a1a1a;
            --bg-elevated: #282828;
            --text-subdued: #a7a7a7;
        }

        /* Estilização customizada de scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #888;
        }

        /* Inputs do tipo Range (Barra de progresso e volume) */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            height: 4px;
            border-radius: 2px;
            cursor: pointer;
        }
        input[type=range]:focus {
            outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: #4d4d4d;
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #fff;
            -webkit-appearance: none;
            margin-top: -4px;
            display: none; /* Oculta por padrão, mostra no hover do container */
        }
        .range-container:hover input[type=range]::-webkit-slider-thumb {
            display: block;
        }
        .range-container:hover input[type=range]::-webkit-slider-runnable-track {
            background: var(--spotify-green); /* Fica verde ao passar o mouse */
        }

        /* Efeitos de Hover nas linhas da tabela */
        .track-row:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .track-row:hover .track-num {
            display: none;
        }
        .track-row:hover .track-play-icon {
            display: inline-block;
        }
        .track-play-icon {
            display: none;
            color: #fff;
        }
        
        .active-track {
            color: var(--spotify-green);
        }

        /* Placeholder image background */
        .default-cover {
            background: linear-gradient(135deg, #282828, #3e3e3e);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
        }

        /* Animação de Loading */
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--spotify-green);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Modificadores de botões ativos */
        .btn-active {
            color: var(--spotify-green) !important;
        }
        .repeat-one::after {
            content: '1';
            position: absolute;
            font-size: 8px;
            font-weight: bold;
            top: -4px;
            right: -4px;
            background: var(--bg-base);
            border-radius: 50%;
            width: 12px;
            height: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="h-screen flex flex-col selection:bg-[#1db954] selection:text-white" onload="loadFromGitHub()">

    <!-- Área Principal (Topo) -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- Barra Lateral Esquerda (Navegação) -->
        <aside class="w-64 bg-black flex flex-col p-4 gap-6 shrink-0 z-10">
            <div class="flex items-center gap-3 text-white font-bold text-2xl px-2">
                <!-- Imagem da logo que será carregada do GitHub -->
                <img id="appLogo" src="" alt="Dg / Music" class="w-8 h-8 rounded-lg object-cover hidden shadow-md">
                <!-- Ícone padrão enquanto carrega -->
                <div id="defaultLogo" class="bg-[var(--spotify-green)] text-black w-8 h-8 rounded-lg flex items-center justify-center shadow-md">
                    <i class="fa-solid fa-music text-lg"></i>
                </div>
                <span>Dg <span class="text-[var(--text-subdued)] font-light">/</span> Music</span>
            </div>

            <nav class="flex flex-col gap-4 text-sm font-semibold text-[var(--text-subdued)]">
                <a href="#" class="flex items-center gap-4 hover:text-white transition-colors px-2">
                    <i class="fa-solid fa-house text-xl"></i>
                    Início
                </a>
                <a href="#" onclick="document.getElementById('searchInput').focus(); return false;" class="flex items-center gap-4 hover:text-white transition-colors px-2">
                    <i class="fa-solid fa-magnifying-glass text-xl"></i>
                    Buscar
                </a>
            </nav>

            <div class="flex-1 bg-[var(--bg-base)] rounded-lg flex flex-col overflow-hidden p-2 mt-2">
                <div class="flex items-center justify-between text-[var(--text-subdued)] px-2 py-3 font-bold border-b border-[#282828]">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                        <span>Adicionadas Recentemente</span>
                    </div>
                </div>

                <!-- Lista de Músicas Recentes -->
                <div id="recentTracksContainer" class="mt-2 flex-1 overflow-y-auto px-2 flex flex-col gap-1 pb-4">
                    <div class="text-center text-xs text-[var(--text-subdued)] py-4">A carregar...</div>
                </div>
            </div>
        </aside>

        <!-- Área Central (Lista de Músicas) -->
        <main class="flex-1 bg-[var(--bg-base)] flex flex-col rounded-lg my-2 mr-2 overflow-hidden relative" style="background: linear-gradient(to bottom, #2a2a2a 0%, var(--bg-base) 300px);">
            <!-- Cabeçalho (Fixo) -->
            <header class="h-16 flex items-center px-6 justify-between shrink-0 sticky top-0 z-20" style="background-color: rgba(18, 18, 18, 0.7); backdrop-filter: blur(10px);">
                <div class="flex gap-4 items-center w-full max-w-md">
                    <div class="flex gap-2">
                        <button class="w-8 h-8 rounded-full bg-black/50 text-[var(--text-subdued)] flex items-center justify-center hover:text-white">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <button class="w-8 h-8 rounded-full bg-black/50 text-[var(--text-subdued)] flex items-center justify-center hover:text-white">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                    <!-- Nova Barra de Busca -->
                    <div class="relative w-full">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-[var(--text-subdued)]"></i>
                        <input type="text" id="searchInput" oninput="filterTracks()" placeholder="O que pretende ouvir?" class="w-full bg-[#242424] text-white text-sm rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-white border border-transparent hover:bg-[#2a2a2a] transition-colors">
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-[var(--bg-elevated)] flex items-center justify-center">
                        <i class="fa-regular fa-user text-sm"></i>
                    </div>
                </div>
            </header>

            <!-- Título Principal -->
            <div class="px-6 py-6 pb-4">
                <h1 class="text-3xl font-bold text-white mb-6">Músicas do Repositório</h1>
                
                <!-- Cabeçalho da Tabela -->
                <div class="grid grid-cols-[50px_minmax(200px,1fr)_150px] gap-4 px-4 text-xs uppercase tracking-wider text-[var(--text-subdued)] border-b border-[#282828] pb-2 mb-2">
                    <div class="text-center">#</div>
                    <div>Título</div>
                    <div class="text-right pr-8"><i class="fa-regular fa-clock text-lg"></i></div>
                </div>

                <!-- Lista de Músicas -->
                <div id="trackListContainer" class="flex flex-col overflow-y-auto pb-24">
                    <div class="text-center text-[var(--text-subdued)] py-10 flex flex-col items-center">
                        <div class="spinner mb-4"></div>
                        <p>Conectando ao GitHub e carregando as faixas...</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Barra Lateral Direita (Detalhes / Arquivo .txt) -->
        <aside class="w-72 bg-[var(--bg-base)] flex flex-col my-2 mr-2 rounded-lg overflow-hidden shrink-0 hidden" id="infoPanel">
            <div class="p-4 flex flex-col h-full">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-bold text-white">Sobre a Música</h2>
                    <button onclick="toggleInfoPanel()" class="text-[var(--text-subdued)] hover:text-white">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="flex flex-col items-center mb-4">
                    <img id="infoCover" src="" class="w-full aspect-square object-cover rounded-lg shadow-lg mb-4 default-cover">
                    <h3 id="infoTitle" class="font-bold text-xl text-white text-center">Título</h3>
                    <p id="infoArtist" class="text-[var(--text-subdued)] text-sm text-center">Autor</p>
                </div>

                <!-- Aqui entra o conteúdo do .txt -->
                <div class="bg-[#242424] rounded-lg p-4 flex-1 overflow-y-auto">
                    <h4 class="text-xs font-bold text-white mb-2 uppercase tracking-wide">Descrição e Configurações</h4>
                    <pre id="infoDescription" class="text-sm text-[var(--text-subdued)] whitespace-pre-wrap font-sans">Aguardando...</pre>
                </div>
            </div>
        </aside>

    </div>

    <!-- Barra de Controles Inferior (Player) -->
    <footer class="h-24 bg-[#181818] border-t border-[#282828] flex items-center justify-between px-4 z-30 shrink-0">
        
        <!-- Info da Música (Esquerda) -->
        <div class="flex items-center gap-4 w-[30%] min-w-[180px]">
            <img id="playerCover" src="" class="w-14 h-14 rounded object-cover shadow-sm default-cover" style="display: none;">
            <div id="playerPlaceholder" class="w-14 h-14 rounded default-cover">
                <i class="fa-solid fa-music text-xl"></i>
            </div>
            <div class="flex flex-col overflow-hidden">
                <span id="playerTitle" class="text-sm text-white font-semibold truncate hover:underline cursor-pointer">Nenhuma música</span>
                <span id="playerArtist" class="text-xs text-[var(--text-subdued)] truncate hover:underline cursor-pointer hover:text-white">---</span>
            </div>
            <button id="likeBtn" onclick="toggleLike()" class="text-[var(--text-subdued)] hover:text-white ml-2 text-sm transition-colors">
                <i class="fa-regular fa-heart"></i>
            </button>
        </div>

        <!-- Controles Centrais -->
        <div class="flex flex-col items-center max-w-[40%] w-full gap-2">
            <!-- Botões -->
            <div class="flex items-center gap-6">
                <button id="shuffleBtn" onclick="toggleShuffle()" class="text-[var(--text-subdued)] hover:text-white transition-colors relative"><i class="fa-solid fa-shuffle"></i></button>
                <button onclick="prevTrack()" class="text-[var(--text-subdued)] hover:text-white transition-colors text-lg"><i class="fa-solid fa-backward-step"></i></button>
                <button onclick="togglePlay()" class="w-8 h-8 rounded-full bg-white text-black flex items-center justify-center hover:scale-105 transition-transform">
                    <i id="playPauseIcon" class="fa-solid fa-play ml-1"></i>
                </button>
                <button onclick="nextTrack()" class="text-[var(--text-subdued)] hover:text-white transition-colors text-lg"><i class="fa-solid fa-forward-step"></i></button>
                <button id="repeatBtn" onclick="toggleRepeat()" class="text-[var(--text-subdued)] hover:text-white transition-colors relative"><i class="fa-solid fa-repeat"></i></button>
            </div>
            
            <!-- Barra de Progresso -->
            <div class="flex items-center gap-2 w-full text-xs text-[var(--text-subdued)] range-container">
                <span id="currentTimeDisplay">0:00</span>
                <div class="flex-1 relative flex items-center group">
                    <input type="range" id="progressBar" min="0" max="100" value="0" oninput="seek(this.value)">
                </div>
                <span id="durationDisplay">0:00</span>
            </div>
        </div>

        <!-- Controles Direitos (Volume, etc) -->
        <div class="flex items-center justify-end gap-3 w-[30%] min-w-[180px] text-[var(--text-subdued)]">
            <button onclick="toggleInfoPanel()" class="hover:text-white transition-colors" title="Ver detalhes (Arquivo .txt)">
                <i class="fa-solid fa-file-lines"></i>
            </button>
            <button class="hover:text-white transition-colors">
                <i class="fa-solid fa-list-ul"></i>
            </button>
            <div class="flex items-center gap-2 w-24 range-container">
                <i id="volumeIcon" onclick="toggleMute()" class="fa-solid fa-volume-high text-sm cursor-pointer hover:text-white transition-colors w-4 text-center"></i>
                <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)">
            </div>
        </div>
    </footer>

    <!-- Elemento de Áudio Oculto -->
    <audio id="audioElement" ontimeupdate="updateProgress()" onloadedmetadata="setupAudio()" ondurationchange="setupAudio()" onended="nextTrack()"></audio>

    <script>
        // URL base da API do GitHub para ler a raiz do repositório
        const GITHUB_REPO_API = 'https://api.github.com/repos/gamesistem/DG-Music/contents/';
        
        let tracks = [];
        let currentIndex = -1;
        let isPlaying = false;
        
        // Variáveis de estado para novas funções
        let isShuffle = false;
        let repeatMode = 0; // 0: Desligado, 1: Repetir Todas, 2: Repetir Uma
        let isMuted = false;
        let lastVolume = 1;
        
        const audio = document.getElementById('audioElement');
        const playPauseIcon = document.getElementById('playPauseIcon');
        const progressBar = document.getElementById('progressBar');
        const volumeBar = document.getElementById('volumeBar');
        
        const playerCover = document.getElementById('playerCover');
        const playerPlaceholder = document.getElementById('playerPlaceholder');
        const playerTitle = document.getElementById('playerTitle');
        const playerArtist = document.getElementById('playerArtist');
        const trackListContainer = document.getElementById('trackListContainer');

        const infoPanel = document.getElementById('infoPanel');
        const infoCover = document.getElementById('infoCover');
        const infoTitle = document.getElementById('infoTitle');
        const infoArtist = document.getElementById('infoArtist');
        const infoDescription = document.getElementById('infoDescription');

        const appLogo = document.getElementById('appLogo');
        const defaultLogo = document.getElementById('defaultLogo');
        
        const shuffleBtn = document.getElementById('shuffleBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const volumeIcon = document.getElementById('volumeIcon');
        const likeBtn = document.getElementById('likeBtn');

        // Formata segundos para MM:SS
        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // Função que lê os dados do GitHub
        async function loadFromGitHub() {
            trackListContainer.innerHTML = `
                <div class="text-center text-[var(--text-subdued)] py-10 flex flex-col items-center">
                    <div class="spinner mb-4"></div>
                    <p>Buscando arquivos de github.com/gamesistem/DG-Music...</p>
                </div>
            `;

            try {
                const response = await fetch(GITHUB_REPO_API);
                if (!response.ok) {
                    throw new Error('Falha ao aceder ao repositório. Verifique se o nome está correto e se o repositório é público.');
                }
                
                const files = await response.json();
                processGitHubFiles(files);
            } catch (error) {
                console.error("Erro na API do GitHub:", error);
                trackListContainer.innerHTML = `
                    <div class="text-center text-[#f7706a] py-10">
                        <i class="fa-solid fa-triangle-exclamation text-4xl mb-4"></i>
                        <p>Erro ao ler o repositório.</p>
                        <p class="text-sm mt-2 text-[var(--text-subdued)]">${error.message}</p>
                    </div>
                `;
            }
        }

        // Agrupa e formata as músicas vindas do GitHub e procura a logo
        function processGitHubFiles(files) {
            const fileGroups = {};
            
            // Procura a logo (logo.png ou logo.ico ou logo.jpg) na raiz do repositório
            const logoFile = files.find(file => file.name.toLowerCase() === 'logo.png' || file.name.toLowerCase() === 'logo.jpg');
            if (logoFile) {
                appLogo.src = logoFile.download_url;
                appLogo.classList.remove('hidden');
                defaultLogo.classList.add('hidden');
            }
            
            // Agrupar arquivos pelo nome base (ignorando a extensão)
            files.forEach(file => {
                if (file.type !== 'file') return;
                
                const lastDot = file.name.lastIndexOf('.');
                if (lastDot === -1) return;

                const ext = file.name.substring(lastDot + 1).toLowerCase();
                const baseName = file.name.substring(0, lastDot);

                // Ignora o ficheiro se for a logo em si, para não criar uma "música" vazia
                if (baseName.toLowerCase() === 'logo') return;

                if (!fileGroups[baseName]) {
                    fileGroups[baseName] = {};
                }
                // O GitHub fornece o `download_url` que leva direto ao RAW file
                fileGroups[baseName][ext] = file.download_url;
            });

            tracks = [];
            for (const baseName in fileGroups) {
                const group = fileGroups[baseName];
                
                if (group.mp3) {
                    // Estrutura esperada: nomedamúsica_autordamúsica
                    const parts = baseName.split('_');
                    let title = parts[0] ? parts[0].trim() : baseName;
                    let artist = parts[1] ? parts[1].trim() : 'Autor Desconhecido';

                    // Limpa nomes para remover traços ou sublinhados
                    title = title.replace(/-/g, ' ');
                    artist = artist.replace(/-/g, ' ');

                    // Selecionar imagem (.ico, .png, .jpg)
                    let coverUrl = group.ico || group.png || group.jpg || null;

                    // Selecionar ficheiro de texto (.txt)
                    let txtUrl = group.txt || null;
                    if (!txtUrl && fileGroups['descrição_música'] && fileGroups['descrição_música'].txt) {
                        txtUrl = fileGroups['descrição_música'].txt;
                    }

                    tracks.push({
                        id: tracks.length,
                        title: title,
                        artist: artist,
                        audioUrl: group.mp3,
                        coverUrl: coverUrl,
                        txtUrl: txtUrl,
                        description: null // Será carregada sob demanda para economizar tráfego
                    });
                }
            }

            filterTracks(); // Usa a função de filtro para renderizar a lista principal
            renderRecentTracks(); // Renderiza o painel de recentes na lateral
        }

        // Função para mostrar as músicas "Adicionadas Recentemente" no menu lateral
        function renderRecentTracks() {
            const container = document.getElementById('recentTracksContainer');
            container.innerHTML = '';
            
            if (tracks.length === 0) {
                container.innerHTML = `<div class="text-center text-xs text-[var(--text-subdued)] py-4">Nenhuma música disponível.</div>`;
                return;
            }

            // Exibe as últimas 5 músicas da lista para representar as mais recentes
            const recentTracks = tracks.slice().reverse().slice(0, 5);

            recentTracks.forEach(track => {
                const item = document.createElement('div');
                item.className = 'flex items-center gap-3 p-2 rounded-md hover:bg-[#282828] cursor-pointer transition-colors group';
                item.onclick = () => playTrack(track.id);

                const coverHTML = track.coverUrl 
                    ? `<img src="${track.coverUrl}" class="w-10 h-10 object-cover rounded shadow-sm">`
                    : `<div class="w-10 h-10 bg-[#282828] flex items-center justify-center rounded shadow-sm text-xs"><i class="fa-solid fa-music"></i></div>`;

                item.innerHTML = `
                    <div class="relative w-10 h-10 shrink-0">
                        ${coverHTML}
                        <div class="absolute inset-0 bg-black/50 hidden group-hover:flex items-center justify-center rounded">
                            <i class="fa-solid fa-play text-white text-xs ml-0.5"></i>
                        </div>
                    </div>
                    <div class="flex flex-col overflow-hidden w-full">
                        <span class="text-sm text-white truncate font-medium group-hover:text-[var(--spotify-green)] transition-colors">${track.title}</span>
                        <span class="text-xs text-[var(--text-subdued)] truncate">${track.artist}</span>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // Função de Busca/Filtro
        function filterTracks() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = tracks.filter(t => t.title.toLowerCase().includes(query) || t.artist.toLowerCase().includes(query));
            renderTrackList(filtered);
        }

        // Exibe as músicas na tabela central
        function renderTrackList(tracksToRender = tracks) {
            trackListContainer.innerHTML = '';

            if (tracksToRender.length === 0) {
                const query = document.getElementById('searchInput').value;
                trackListContainer.innerHTML = `
                    <div class="text-center text-[var(--text-subdued)] py-10">
                        <i class="fa-solid fa-magnifying-glass text-4xl mb-4 opacity-50"></i>
                        <p>${query ? 'Nenhuma música encontrada para "' + query + '".' : 'Nenhuma música .mp3 encontrada no repositório.'}</p>
                    </div>`;
                return;
            }

            tracksToRender.forEach((track) => {
                const isCurrent = currentIndex === track.id;
                const row = document.createElement('div');
                row.className = `track-row grid grid-cols-[50px_minmax(200px,1fr)_150px] gap-4 px-4 py-2 text-sm rounded-md items-center text-[var(--text-subdued)] cursor-pointer transition-colors ${isCurrent ? 'active-track' : ''}`;
                row.onclick = () => playTrack(track.id);

                // Capa ou Ícone padrão da listagem
                const coverHTML = track.coverUrl 
                    ? `<img src="${track.coverUrl}" class="w-10 h-10 object-cover rounded shadow">`
                    : `<div class="w-10 h-10 bg-[#282828] flex items-center justify-center rounded shadow"><i class="fa-solid fa-music"></i></div>`;

                row.innerHTML = `
                    <div class="text-center w-full flex items-center justify-center relative h-10">
                        <span class="track-num ${isCurrent ? 'hidden' : ''}">${track.id + 1}</span>
                        <i class="fa-solid fa-play track-play-icon absolute ${isCurrent ? '!block text-[var(--spotify-green)]' : ''}"></i>
                    </div>
                    <div class="flex items-center gap-3 overflow-hidden">
                        ${coverHTML}
                        <div class="flex flex-col truncate">
                            <span class="font-normal text-white truncate ${isCurrent ? 'text-[var(--spotify-green)]' : ''}">${track.title}</span>
                            <span class="text-xs truncate">${track.artist}</span>
                        </div>
                    </div>
                    <div class="text-right pr-8">
                        <i class="fa-solid fa-music opacity-30 text-xs"></i>
                    </div>
                `;
                trackListContainer.appendChild(row);
            });
        }

        // Lógica de Tocar Música (Otimizada para carregamento em tempo real do GitHub)
        function playTrack(index) {
            if (index < 0 || index >= tracks.length) return;
            
            const track = tracks[index];
            currentIndex = index;

            // Mostra o loading no botão enquanto carrega
            playPauseIcon.className = 'fa-solid fa-spinner fa-spin ml-0';

            // Carrega a fonte RAW do GitHub
            audio.src = track.audioUrl;
            
            audio.play().then(() => {
                isPlaying = true;
                updateUIPlayState();
                updateNowPlayingUI(track);
                filterTracks(); // Atualiza a cor ativa na lista mantendo o filtro atual
            }).catch(e => {
                console.error("Erro ao tocar áudio do GitHub:", e);
                playPauseIcon.className = 'fa-solid fa-play ml-1';
                isPlaying = false;
            });
        }

        // Toca ou Pausa
        function togglePlay() {
            if (tracks.length === 0) return;
            if (currentIndex === -1) {
                playTrack(0);
                return;
            }

            if (audio.paused) {
                playPauseIcon.className = 'fa-solid fa-spinner fa-spin ml-0';
                audio.play().then(() => {
                    isPlaying = true;
                    updateUIPlayState();
                }).catch(e => console.error(e));
            } else {
                audio.pause();
                isPlaying = false;
                updateUIPlayState();
            }
        }

        function prevTrack() {
            if (tracks.length === 0) return;
            // Se já passou de 3 segundos, volta ao início da música atual
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
            } else {
                let newIndex = currentIndex - 1;
                if (newIndex < 0) newIndex = tracks.length - 1;
                playTrack(newIndex);
            }
        }

        function nextTrack() {
            if (tracks.length === 0) return;
            
            // Se estiver no modo "Repetir Uma"
            if (repeatMode === 2) {
                audio.currentTime = 0;
                audio.play();
                return;
            }

            let newIndex;
            
            if (isShuffle) {
                // Modo Aleatório
                if (tracks.length === 1) {
                    newIndex = 0;
                } else {
                    do {
                        newIndex = Math.floor(Math.random() * tracks.length);
                    } while (newIndex === currentIndex);
                }
            } else {
                // Modo Normal
                newIndex = currentIndex + 1;
                if (newIndex >= tracks.length) {
                    if (repeatMode === 1) {
                        newIndex = 0; // Repetir Todas: volta para a primeira
                    } else {
                        // Desligado: para a reprodução no fim da lista
                        audio.pause();
                        isPlaying = false;
                        updateUIPlayState();
                        audio.currentTime = 0;
                        updateProgress();
                        return;
                    }
                }
            }
            playTrack(newIndex);
        }

        function updateUIPlayState() {
            if (isPlaying) {
                playPauseIcon.classList.remove('fa-play');
                playPauseIcon.classList.add('fa-pause');
                playPauseIcon.classList.remove('ml-1'); // Ajusta centralização visual
            } else {
                playPauseIcon.classList.remove('fa-pause');
                playPauseIcon.classList.add('fa-play');
                playPauseIcon.classList.add('ml-1');
            }
        }

        // Atualiza imagens, títulos e painel da música atual
        function updateNowPlayingUI(track) {
            playerTitle.textContent = track.title;
            playerArtist.textContent = track.artist;
            
            infoTitle.textContent = track.title;
            infoArtist.textContent = track.artist;
            
            // Carrega a imagem
            if (track.coverUrl) {
                playerCover.src = track.coverUrl;
                playerCover.style.display = 'block';
                playerPlaceholder.style.display = 'none';

                infoCover.src = track.coverUrl;
                infoCover.classList.remove('default-cover');
                infoCover.innerHTML = '';
            } else {
                playerCover.style.display = 'none';
                playerPlaceholder.style.display = 'flex';

                infoCover.src = '';
                infoCover.classList.add('default-cover');
            }

            // Carrega o arquivo de texto (.txt) do GitHub de forma assíncrona
            if (track.description === null && track.txtUrl) {
                infoDescription.textContent = 'A carregar informações...';
                fetch(track.txtUrl)
                    .then(res => res.text())
                    .then(text => {
                        track.description = text;
                        if (currentIndex !== -1 && tracks[currentIndex].id === track.id) {
                            infoDescription.textContent = text;
                        }
                    })
                    .catch(() => {
                        infoDescription.textContent = 'Não foi possível carregar a descrição.';
                    });
            } else {
                infoDescription.textContent = track.description || 'Nenhum ficheiro .txt ou de descrição encontrado.';
            }
        }

        // Configuração ao carregar metadados do áudio (preparado para streaming contínuo)
        function setupAudio() {
            if (isFinite(audio.duration)) {
                progressBar.max = audio.duration;
                document.getElementById('durationDisplay').textContent = formatTime(audio.duration);
            }
        }

        // Atualiza barra de progresso durante reprodução
        function updateProgress() {
            progressBar.value = audio.currentTime;
            document.getElementById('currentTimeDisplay').textContent = formatTime(audio.currentTime);
            
            // Pinta o background da track do input range (Efeito visual)
            const duration = isFinite(audio.duration) ? audio.duration : 1;
            const percent = duration > 0 ? (audio.currentTime / duration) * 100 : 0;
            progressBar.style.background = `linear-gradient(to right, #fff ${percent}%, #4d4d4d ${percent}%)`;
        }

        // Avançar ou Retroceder pela barra
        function seek(value) {
            audio.currentTime = value;
            updateProgress(); // Atualiza cor imediatamente
        }

        // Volume
        function setVolume(value) {
            audio.volume = value;
            isMuted = (value == 0);
            updateVolumeUI(value);
        }

        // Atualiza interface do volume e ícone
        function updateVolumeUI(value) {
            const percent = value * 100;
            volumeBar.style.background = `linear-gradient(to right, #fff ${percent}%, #4d4d4d ${percent}%)`;
            
            if (value == 0) {
                volumeIcon.className = 'fa-solid fa-volume-xmark text-sm cursor-pointer hover:text-white transition-colors w-4 text-center';
            } else if (value < 0.5) {
                volumeIcon.className = 'fa-solid fa-volume-low text-sm cursor-pointer hover:text-white transition-colors w-4 text-center';
            } else {
                volumeIcon.className = 'fa-solid fa-volume-high text-sm cursor-pointer hover:text-white transition-colors w-4 text-center';
            }
        }

        function toggleMute() {
            if (isMuted) {
                audio.volume = lastVolume > 0 ? lastVolume : 1; // Restaura ou define para 100% se estava a zeros
                volumeBar.value = audio.volume;
                isMuted = false;
                updateVolumeUI(audio.volume);
            } else {
                lastVolume = audio.volume; // Guarda o volume atual
                audio.volume = 0;
                volumeBar.value = 0;
                isMuted = true;
                updateVolumeUI(0);
            }
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('btn-active', isShuffle);
        }

        function toggleRepeat() {
            repeatMode = (repeatMode + 1) % 3; // Alterna 0 -> 1 -> 2 -> 0
            
            if (repeatMode === 0) {
                // Desligado
                repeatBtn.classList.remove('btn-active', 'repeat-one');
            } else if (repeatMode === 1) {
                // Repetir Todas
                repeatBtn.classList.add('btn-active');
                repeatBtn.classList.remove('repeat-one');
            } else if (repeatMode === 2) {
                // Repetir Uma (Adiciona o selo '1' via CSS)
                repeatBtn.classList.add('btn-active', 'repeat-one');
            }
        }

        function toggleLike() {
            const icon = likeBtn.querySelector('i');
            if (icon.classList.contains('fa-regular')) {
                icon.className = 'fa-solid fa-heart text-[var(--spotify-green)] transition-colors';
            } else {
                icon.className = 'fa-regular fa-heart transition-colors';
            }
        }

        // Painel Lateral (TXT Info)
        function toggleInfoPanel() {
            infoPanel.classList.toggle('hidden');
        }

        // Inicializa estado visual de barras de Range
        setVolume(1);
        updateProgress();

    </script>
</body>
</html>
